<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Stylized "M" for menudan made of fork tines + menu lines -->
  <g transform="translate(96, 112)" fill="white">
    <!-- Left vertical bar (like a fork tine / M leg) -->
    <rect x="0" y="0" width="40" height="288" rx="20"/>
    <!-- Right vertical bar -->
    <rect x="280" y="0" width="40" height="288" rx="20"/>
    <!-- M middle: two diagonal strokes meeting in center -->
    <path d="M20 30 L160 180 L300 30" fill="none" stroke="white" stroke-width="40" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Small horizontal menu lines in the lower portion -->
    <rect x="80" y="210" width="160" height="10" rx="5" opacity="0.5"/>
    <rect x="100" y="240" width="120" height="10" rx="5" opacity="0.35"/>
    <rect x="110" y="270" width="100" height="10" rx="5" opacity="0.2"/>
  </g>
</svg>
