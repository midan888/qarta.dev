name: Deploy to Lightsail

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/qarta-dev

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Copy docker-compose to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}
          username: ${{ secrets.LIGHTSAIL_USER }}
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          source: "docker-compose.prod.yml,Caddyfile"
          target: ~/qarta-dev
          overwrite: true

      - name: Write .env file on server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}
          username: ${{ secrets.LIGHTSAIL_USER }}
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          envs: NEXT_PUBLIC_APP_URL,NEXT_PUBLIC_APP_NAME,POSTGRES_PASSWORD,NEXTAUTH_URL,NEXTAUTH_SECRET,AUTH_SECRET,AUTH_TRUST_HOST,GOOGLE_CLIENT_ID,GOOGLE_CLIENT_SECRET,S3_BUCKET,S3_REGION,S3_ACCESS_KEY_ID,S3_SECRET_ACCESS_KEY,S3_ENDPOINT,ANTHROPIC_API_KEY,STRIPE_SECRET_KEY,STRIPE_PUBLISHABLE_KEY,STRIPE_WEBHOOK_SECRET,STRIPE_PRO_PRICE_ID,STRIPE_BUSINESS_PRICE_ID,RESEND_API_KEY,EMAIL_FROM,CADDY_DOMAIN
          script: |
            ENV_FILE=~/qarta-dev/.env
            echo "NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL}" > $ENV_FILE
            echo "NEXT_PUBLIC_APP_NAME=${NEXT_PUBLIC_APP_NAME}" >> $ENV_FILE
            echo "POSTGRES_PASSWORD=${POSTGRES_PASSWORD}" >> $ENV_FILE
            echo "NEXTAUTH_URL=${NEXTAUTH_URL}" >> $ENV_FILE
            echo "NEXTAUTH_SECRET=${NEXTAUTH_SECRET}" >> $ENV_FILE
            echo "AUTH_SECRET=${AUTH_SECRET}" >> $ENV_FILE
            echo "AUTH_TRUST_HOST=${AUTH_TRUST_HOST}" >> $ENV_FILE
            echo "GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}" >> $ENV_FILE
            echo "GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}" >> $ENV_FILE
            echo "S3_BUCKET=${S3_BUCKET}" >> $ENV_FILE
            echo "S3_REGION=${S3_REGION}" >> $ENV_FILE
            echo "S3_ACCESS_KEY_ID=${S3_ACCESS_KEY_ID}" >> $ENV_FILE
            echo "S3_SECRET_ACCESS_KEY=${S3_SECRET_ACCESS_KEY}" >> $ENV_FILE
            echo "S3_ENDPOINT=${S3_ENDPOINT}" >> $ENV_FILE
            echo "ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}" >> $ENV_FILE
            echo "STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}" >> $ENV_FILE
            echo "STRIPE_PUBLISHABLE_KEY=${STRIPE_PUBLISHABLE_KEY}" >> $ENV_FILE
            echo "STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}" >> $ENV_FILE
            echo "STRIPE_PRO_PRICE_ID=${STRIPE_PRO_PRICE_ID}" >> $ENV_FILE
            echo "STRIPE_BUSINESS_PRICE_ID=${STRIPE_BUSINESS_PRICE_ID}" >> $ENV_FILE
            echo "RESEND_API_KEY=${RESEND_API_KEY}" >> $ENV_FILE
            echo "EMAIL_FROM=${EMAIL_FROM}" >> $ENV_FILE
            echo "CADDY_DOMAIN=${CADDY_DOMAIN}" >> $ENV_FILE
        env:
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
          NEXT_PUBLIC_APP_NAME: ${{ secrets.NEXT_PUBLIC_APP_NAME }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          AUTH_TRUST_HOST: ${{ secrets.AUTH_TRUST_HOST }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          S3_REGION: ${{ secrets.S3_REGION }}
          S3_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
          S3_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
          S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_PUBLISHABLE_KEY: ${{ secrets.STRIPE_PUBLISHABLE_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          STRIPE_PRO_PRICE_ID: ${{ secrets.STRIPE_PRO_PRICE_ID }}
          STRIPE_BUSINESS_PRICE_ID: ${{ secrets.STRIPE_BUSINESS_PRICE_ID }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          CADDY_DOMAIN: ${{ secrets.CADDY_DOMAIN }}

      - name: Deploy to Lightsail
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}
          username: ${{ secrets.LIGHTSAIL_USER }}
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          script: |
            cd ~/qarta-dev

            # Use prod compose as default
            mv -f docker-compose.prod.yml docker-compose.yml

            # Login to GHCR
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull latest image and restart
            docker compose pull
            docker compose up -d

            # Wait for app to be healthy
            sleep 5

            # Run database migrations
            docker compose exec -T app node ./node_modules/drizzle-kit/bin.cjs migrate

            # Reload Caddy config (zero-downtime)
            docker compose exec -T caddy caddy reload --config /etc/caddy/Caddyfile

            # Clean up old images
            docker image prune -f

      - name: Notify Telegram
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            MESSAGE="✅ *qarta.dev* deployed successfully%0ACommit: \`${GITHUB_SHA::7}\`%0ABy: ${{ github.actor }}"
          else
            MESSAGE="❌ *qarta.dev* deploy failed%0ACommit: \`${GITHUB_SHA::7}\`%0ABy: ${{ github.actor }}"
          fi
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
            -d text="$MESSAGE" \
            -d parse_mode=Markdown
